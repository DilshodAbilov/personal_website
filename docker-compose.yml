# ============================================================
# Personal Dev Space — Local development infrastructure
# Qadam 1.1: data servislar (PostgreSQL + Redis + MinIO)
# Backend / frontend / nginx servislari keyingi qadamlarda qo'shiladi.
# ============================================================

services:
  # ---------- PostgreSQL 16 ----------
  postgres:
    image: postgres:16-alpine
    container_name: devspace_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devspace_net

  # ---------- Redis (cache + Celery broker) ----------
  redis:
    image: redis:7-alpine
    container_name: devspace_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devspace_net

  # ---------- MinIO (S3-compatible storage) ----------
  minio:
    image: minio/minio:latest
    container_name: devspace_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devspace_net

  # ---------- MinIO bucket init (bir martalik) ----------
  minio-init:
    image: minio/mc:latest
    container_name: devspace_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${MINIO_BUCKET};
      mc anonymous set download local/${MINIO_BUCKET};
      echo 'MinIO bucket tayyor: ${MINIO_BUCKET}';
      exit 0;
      "
    networks:
      - devspace_net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  devspace_net:
    driver: bridge
